<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Web Sitem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Üst Menü (Aynı yapıyı koruyoruz) -->
    <nav class="navbar">
        <a href="index.html" class="nav-link">Home</a>
        <a href="register.html" class="nav-link">Register</a>
        <a href="login.html" class="nav-link">Login</a>
    </nav>

    <!-- Kayıt Formu Kutusu -->
    <main class="form-container">
        <h2>Hesap Oluştur</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="Kullanıcı adınızı girin" required>
            </div>

            <div class="input-group">
                <label for="email">E-posta Adresi</label>
                <input type="email" id="email" placeholder="ornek@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">Şifre</label>
                <div style="display: flex; gap: 5px;">
                    <input type="password" id="password" placeholder="Şifrenizi girin" required style="flex: 1;">
                    <button type="button" id="togglePasswordBtn" style="padding: 0 10px; cursor: pointer;">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn">Kayıt Ol</button>
        </form>
    </main>

    <script>
      // Şifre Göster / Gizle Butonu
      document.getElementById('togglePasswordBtn').addEventListener('click', function () {
          const passwordInput = document.getElementById('password');
          if (passwordInput.type === 'password') {
              passwordInput.type = 'text';
              this.textContent = '🙈';
          } else {
              passwordInput.type = 'password';
              this.textContent = '👁️';
          }
      });

      // Kayıt Ol İşlemi
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
          e.preventDefault();

          const username = document.querySelector('#username').value;
          const email = document.querySelector('#email').value;
          const password = document.querySelector('#password').value;

          try {
              const response = await fetch('http://localhost:5000/api/register', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ username, email, password })
              });

              const data = await response.json();

              if (response.ok) {
                  alert('Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz.');
                  window.location.href = 'login.html';
              } else {
                  alert(data.message || 'Kayıt başarısız!');
              }
          } catch (error) {
              console.error('Hata:', error);
              alert('Sunucuya bağlanılamadı! Node.js (server.js) çalışıyor mu?');
          }
      });
    </script>

</body>
</html>
