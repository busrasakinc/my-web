<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Bilgileri</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #4f46e5;
            color: white;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
        }

        .info-group {
            margin: 15px 0;
            text-align: left;
        }

        .info-group label {
            font-size: 12px;
            color: #6b7280;
            display: block;
            margin-bottom: 4px;
        }

        .info-group span {
            font-size: 16px;
            font-weight: bold;
            color: #1f2937;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-home {
            background-color: #e5e7eb;
            color: #374151;
            margin-bottom: 8px;
        }

        .btn-logout {
            background-color: #ef4444;
            color: white;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-avatar" id="avatar-circle">U</div>
        <h2 id="profile-name">user</h2>

        <div class="info-group">
            <label>Kullanıcı Adı</label>
            <span id="info-username">user</span>
        </div>

        <div class="info-group">
            <label>E-posta Adresi</label>
            <span id="info-email">Henüz giriş yapılmadı</span>
        </div>

        <a href="index.html" class="btn btn-home">Ana Sayfaya Dön</a>
        <button class="btn btn-logout" onclick="logout()">Çıkış Yap</button>
    </div>

    <script>
        // Sayfa açıldığında hafızadaki kullanıcı verilerini doldurur
        window.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem('loggedInUser');
            const email = localStorage.getItem('loggedInEmail');

            if (username) {
                document.getElementById('profile-name').textContent = username;
                document.getElementById('info-username').textContent = username;
                document.getElementById('avatar-circle').textContent = username.charAt(0).toUpperCase();
            }

            if (email) {
                document.getElementById('info-email').textContent = email;
            }
        });

        // Çıkış Yap Butonu Fonksiyonu
        function logout() {
            localStorage.clear(); // Hafızayı temizle
            alert('Çıkış yapıldı!');
            window.location.href = 'login.html'; // Giriş sayfasına gönder
        }
    </script>
</body>
</html>
